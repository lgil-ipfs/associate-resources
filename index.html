<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customplan Associate Resources</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header / Nav -->
    <header class="app-header">
      <div class="header-container">
        <div class="logo">
          <h1>Customplan</h1>
          <span>Associate Resources</span>
        </div>
        
        <div class="controls">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search resources, forms, contacts...">
          </div>
          <div class="role-selector">
            <label for="roleFilter">View As:</label>
            <select id="roleFilter">
              <option value="All">All Roles</option>
              <option value="New Advisor">New Advisor</option>
              <option value="Experienced Advisor" selected>Experienced Advisor</option>
              <option value="Administrator">Administrator / Staff</option>
            </select>
          </div>
        </div>
      </div>
      
      <nav class="main-nav">
        <ul id="navLinks">
          <!-- Populated by JS -->
        </ul>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div id="welcomeSection" class="welcome-section">
        <h2 id="welcomeTitle">Welcome to Associate Resources</h2>
        <p id="welcomeDesc">Find the tools, templates, and contacts you need to grow your practice.</p>
      </div>

      <div id="contentArea" class="content-area">
        <!-- Rendered by JS based on selection and filters -->
      </div>
    </main>

    <footer class="app-footer">
      <p>&copy; 2026 Customplan Financial Advisors Inc. All Rights Reserved. For Internal Use Only.</p>
    </footer>
  </div>
  
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
